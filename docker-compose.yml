services:
  dsl-scala:
    image: ebusta-dsl-scala:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.dsl-scala
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50052:50052"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50052"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  query-builder:
    image: ebusta-query-builder:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.query-builder
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50053:50053"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50053"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  datamanager:
    image: ebusta-datamanager:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.datamanager
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50051:50051"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  orchestrator:
    image: ebusta-orchestrator:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.orchestrator
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50054:50054"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
    depends_on:
      dsl-scala:
        condition: service_healthy
      query-builder:
        condition: service_healthy
      datamanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50054"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  archive-node:
    image: ebusta-archive-node:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.archive-node
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50110:50110"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
      - ./data:/data
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50110"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tier-node:
    image: ebusta-tier-node:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.tier-node
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50111:50111"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
      - ./data:/data
    depends_on:
      archive-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50111"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  plasma-node:
    image: ebusta-plasma-node:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.plasma-node
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50112:50112"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
      - ./data:/data
    depends_on:
      tier-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50112"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  downloader:
    image: ebusta-downloader:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.downloader
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "50081:50081"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
      - ./data:/data
    depends_on:
      plasma-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:50081/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  auth-manager:
    image: ebusta-auth-manager:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.auth-manager
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
      EBUSTA_WHITELIST: /app/whitelist.yaml
    ports:
      - "50055:50055"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
      - ./cmd/auth-manager/whitelist.yaml:/app/whitelist.yaml:ro
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50055"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  gateway:
    image: ebusta-gateway:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.gateway
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "8443:8443"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
      - ./data:/data
    depends_on:
      orchestrator:
        condition: service_healthy
      downloader:
        condition: service_healthy
      auth-manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8443/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web-frontend:
    image: ebusta-web-frontend:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.web-frontend
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
    depends_on:
      orchestrator:
        condition: service_healthy
      downloader:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  telegram-adapter:
    profiles: ["adapters"]
    image: ebusta-telegram-adapter:local
    build:
      context: .
      dockerfile: deploy/Dockerfile.telegram-adapter
    environment:
      EBUSTA_CONFIG: /app/ebusta.yaml
    ports:
      - "8087:8087"
    volumes:
      - ./deploy/ebusta.docker.yaml:/app/ebusta.yaml:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
