irc_adapter:
    mode: "bot"
    # старые поля можно оставить как есть
    server_host: "0.0.0.0"
    server_port: 6667
    nick: "ebusta-bot"
    user: "ebusta"
    real_name: "Ebusta Book Search Bot"
    gateway_url: "http://localhost:8443"
    page_size: 5
    debug: true

    # bot mode
    bot_server_host: "yuro"          # или FQDN/IP
    bot_server_port: 6667            # 6697 если TLS
    bot_use_tls: false               # true для 6697
    bot_password: ""                 # если на сервере нужен PASS
    bot_nick: "ebusta-bot"
    bot_user: "ebusta"
    bot_real_name: "Ebusta Book Search Bot"
    bot_channels:
      - "#books"
      - "#test"
    bot_reconnect_seconds: 5
  

telegram_adapter:
  host: "0.0.0.0"
  port: 8087
  gateway_url: "http://localhost:8443"
  page_size: 5
  debug: false

edge:
  reload_mode: "restart"
  default:
    max_line_length: 512
    max_body_bytes: 1048576
    max_json_depth: 10
    actions:
      ip:
        per_minute: 60
        burst: 60
      resolve:
        per_minute: 30
        burst: 30
      command:
        per_minute: 30
        burst: 30
      update:
        per_minute: 30
        burst: 30
  sources:
    gateway:
      actions:
        ip:
          per_minute: 60
          burst: 60
        resolve:
          per_minute: 30
          burst: 30
    irc:
      max_line_length: 512
      actions:
        command:
          per_minute: 30
          burst: 30
    telegram:
      max_line_length: 512
      max_body_bytes: 524288
      max_json_depth: 10
      actions:
        command:
          per_minute: 20
          burst: 20
        update:
          per_minute: 60
          burst: 60
