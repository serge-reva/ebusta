opensearch:
  url: "http://cloud-1:9200"
  index_name: "flibusta_merged_index"
  debug: false

datamanager:
  protocol: "grpc"
  host: "localhost"
  port: 50051
  debug: false

dsl_scala:
  protocol: "grpc"
  host: "localhost"
  port: 50052
  debug: false

query_builder:
  protocol: "grpc"
  host: "localhost"
  port: 50053
  debug: false

orchestrator:
  protocol: "grpc"
  host: "localhost"
  port: 50054
  debug: false

web_adapter:
  protocol: "http"
  host: "localhost"
  port: 50080
  debug: false

web_frontend:
  port: 3000
  page_size: 20
  downloader_addr: "localhost:50081"
  debug: false

metrics:
  port: 50090

downloads:
  archive_node:
    listen_port: 50110
    zip_root: "//mnt/fb2/fb2.Flibusta.Net/"
    sqlite: "./archive.meta.sqlite"

  tier_node:
    listen_port: 50111
    root_path: "./tier.data"
    sqlite: "./tier.meta.sqlite"
    parent: "localhost:50110"

  plasma_node:
    listen_port: 50112
    parent: "localhost:50111"
    max_bytes: 1073741824
    max_items: 1000
    debug: ":8091"

  downloader:
    listen_port: 50081
    plasma: "localhost:50112"

  cli:
    download_dir: "./downloads"

cli:
  debug: false


logger:
  level: INFO
  format: text
  disable_colors: false
  outputs:
    console:
      enabled: true
    file:
      enabled: true
      path: /var/log/ebusta/app.log
      append: true  

gateway:
  port: 8443
  tls_cert: ""  # "/etc/ssl/certs/gateway.crt"
  tls_key: ""   # "/etc/ssl/private/gateway.key"
  
  rate_limit:
    ip: 60           # requests per minute
    authenticated: 100
    download: 10
    resolve: 30      # token resolves per minute
  
  mapper:
    ttl: 3600        # 1 hour
    max_tokens: 10000
    cleanup_interval: 300  # 5 minutes
  
  mtls:
    enabled: false
    ca_file: "/etc/ssl/ca.pem"
    cert_file: "/etc/ssl/gateway.pem"
    key_file: "/etc/ssl/gateway-key.pem"
    server_name: "ebusta.local"
  
  validation:
    max_body_bytes: 1048576     # 1MB
    max_file_bytes: 104857600   # 100MB
    max_query_length: 500
    max_array_items: 1000
    max_json_depth: 10
  
  cors:
    allowed_origins:
      - "https://ebusta.com"
      - "https://app.ebusta.com"
    allowed_methods:
      - "GET"
      - "POST"
      - "HEAD"
      - "OPTIONS"
    allowed_headers:
      - "Origin"
      - "Content-Type"
      - "X-API-Token"
      - "X-CSRF-Token"
    allow_credentials: true
    max_age: 300
  
  services:
    orchestrator: "localhost:50054"
    downloader: "localhost:50081"
    auth: "localhost:50055"

irc_adapter:
  server_host: "0.0.0.0"
  server_port: 6667
  nick: "ebusta-bot"
  user: "ebusta"
  real_name: "Ebusta Book Search Bot"
  gateway_url: "http://localhost:8443"
  page_size: 5
  debug: false
